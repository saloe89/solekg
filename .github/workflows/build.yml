name: Build SolEKG APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '9477386'
          accept-android-sdk-licenses: true

      - name: Install Bubblewrap
        run: |
          npm install -g @bubblewrap/cli
          echo "BUBBLEWRAP_SKIP_UPDATE_CHECK=1" >> $GITHUB_ENV

      - name: Create Bubblewrap config
        run: |
          mkdir apk-build && cd apk-build
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "app.vercel.solekg.twa",
            "host": "solekg.vercel.app",
            "name": "SolEKG",
            "launcherName": "SolEKG",
            "display": "standalone",
            "themeColor": "#9945FF",
            "navigationColor": "#04060f",
            "backgroundColor": "#04060f",
            "startUrl": "/",
            "iconUrl": "https://solekg.vercel.app/icon-512.png",
            "maskableIconUrl": "https://solekg.vercel.app/icon-512.png",
            "appVersion": "1",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../android.keystore",
              "alias": "android"
            },
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "orientation": "portrait",
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://solekg.vercel.app/manifest.json",
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://solekg.vercel.app/",
            "minSdkVersion": 19,
            "fingerprints": []
          }
          EOF

      - name: Generate keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android.keystore \
            -alias android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=SolEKG, OU=SolEKG, O=SolEKG, L=CH, S=CH, C=CH"

      - name: Build APK
        run: |
          cd apk-build
          bubblewrap build \
            --skipPwaValidation \
            --manifest ./twa-manifest.json
        env:
          BUBBLEWRAP_SKIP_UPDATE_CHECK: '1'

      - name: Find and upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SolEKG-APK
          path: |
            apk-build/**/*.apk
            apk-build/**/*.aab
          retention-days: 30
