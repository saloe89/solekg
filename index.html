<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolEKG – Solana Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04060f;
    --surface: rgba(255,255,255,0.03);
    --card: transparent;
    --border: rgba(255,255,255,0.07);
    --sol: #9945FF;
    --sol2: #14F195;
    --amber: #FFB800;
    --red: #FF4757;
    --text: #14F195;
    --muted: #0a8a52;
    --mono: 'Fira Code', monospace;
    --sans: 'Outfit', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated gradient background */
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      135deg,
      #04060f 0%,
      #1a0533 20%,
      #0a2a1a 40%,
      #04060f 55%,
      #0d0133 70%,
      #031a10 85%,
      #04060f 100%
    );
    background-size: 400% 400%;
    animation: gradientShift 12s ease infinite;
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle glow orbs */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 50% 35% at 85% 15%, rgba(153,69,255,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 15% 85%, rgba(20,241,149,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 30% 25% at 50% 50%, rgba(153,69,255,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    animation: orbShift 16s ease-in-out infinite alternate;
  }

  @keyframes orbShift {
    0%   { opacity: 1; }
    50%  { opacity: 0.6; }
    100% { opacity: 1; }
  }

  .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px 100px; }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 0 32px;
  }

  .logo-wrap {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 60px;
  }
  .logo-ekg {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    opacity: 0.7;
  }
  .logo-ekg-svg { width: 100%; height: 100%; }
  .logo-ekg-line {
    fill: none;
    stroke: url(#logoGrad);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 200;
    stroke-dashoffset: 0;
    animation: logoPulse 2.4s ease-in-out infinite;
  }
  .logo-ekg-glow {
    fill: none;
    stroke: url(#logoGrad);
    stroke-width: 6;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.5;
    animation: logoPulse 2.4s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%, 100% { opacity: 1; filter: drop-shadow(0 0 6px #14F195); }
    50% { opacity: 0.2; filter: drop-shadow(0 0 2px #9945FF); }
  }
  .logo-text {
    font-family: var(--sans);
    font-weight: 900;
    font-size: 2.2rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  .logo-text span:first-child {
    background: linear-gradient(
      180deg,
      #ffffff 0%,
      #c084fc 20%,
      #9945FF 40%,
      #6d1fff 55%,
      #3d0099 70%,
      #9945FF 85%,
      #e0c3fc 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 4px rgba(153,69,255,0.9)) drop-shadow(0 -1px 1px rgba(255,255,255,0.3));
    animation: metalShift 4s ease-in-out infinite;
  }
  .logo-text span:last-child {
    background: linear-gradient(
      180deg,
      #ffffff 0%,
      #6effd4 20%,
      #14F195 40%,
      #00a866 55%,
      #005c38 70%,
      #14F195 85%,
      #b2ffe8 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 4px rgba(20,241,149,0.9)) drop-shadow(0 -1px 1px rgba(255,255,255,0.3));
    animation: metalShift 4s ease-in-out infinite 2s;
  }
  @keyframes metalShift {
    0%, 100% { background-position: 0% 0%; filter: drop-shadow(0 2px 6px rgba(153,69,255,0.9)) drop-shadow(0 -1px 2px rgba(255,255,255,0.4)) brightness(1); }
    50% { background-position: 0% 100%; filter: drop-shadow(0 4px 12px rgba(153,69,255,1)) drop-shadow(0 -2px 4px rgba(255,255,255,0.6)) brightness(1.2); }
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* Section label */
  .section-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* SOL Hero Card */
  .sol-hero {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .sol-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(153,69,255,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }

  .sol-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .sol-name {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .sol-price {
    font-family: var(--sans);
    font-size: 2.8rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.04em;
    line-height: 1;
  }
  .sol-change {
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 4px;
  }
  .sol-change.up { background: rgba(20,241,149,0.12); color: var(--sol2); }
  .sol-change.down { background: rgba(255,71,87,0.12); color: var(--red); }

  .sol-icon {
    width: 80px; height: 40px;
    position: relative;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .ekg-svg {
    width: 80px; height: 40px;
    overflow: visible;
  }
  .ekg-line {
    fill: none;
    stroke: url(#ekgGrad);
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 0 4px #14F195);
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: ekgDraw 1.2s ease-out forwards, ekgPulse 2.4s ease-in-out 1.2s infinite;
  }
  .ekg-glow {
    fill: none;
    stroke: url(#ekgGrad);
    stroke-width: 5;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.15;
    stroke-dasharray: 200;
    stroke-dashoffset: 200;
    animation: ekgDraw 1.2s ease-out forwards, ekgPulse 2.4s ease-in-out 1.2s infinite;
  }
  @keyframes ekgDraw {
    to { stroke-dashoffset: 0; }
  }
  @keyframes ekgPulse {
    0%, 100% { opacity: 1; filter: drop-shadow(0 0 4px #14F195); }
    50% { opacity: 0.6; filter: drop-shadow(0 0 8px #9945FF) drop-shadow(0 0 16px #14F195); }
  }
100% { left: 100%; }
  }
100% { left: 100%; }
  }
  .sol-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    margin-top: 16px;
  }
  .sol-stat {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 6px;
  }
  .sol-stat-label { font-family: var(--mono); font-size: 0.58rem; color: var(--muted); letter-spacing: 0.05em; }
  .sol-stat-val { font-family: var(--sans); font-size: 1rem; color: var(--text); font-weight: 700; letter-spacing: -0.02em; }

  /* SKR Card */
  .skr-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .skr-card::before {
    content: 'SKR';
    position: absolute;
    right: 16px; top: 50%;
    transform: translateY(-50%);
    font-family: var(--sans);
    font-size: 4rem;
    font-weight: 900;
    color: rgba(153,69,255,0.05);
    letter-spacing: -0.04em;
    pointer-events: none;
  }
  .skr-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .skr-logo {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
  }
  .skr-name {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
  }
  .skr-right { text-align: right; }
  .skr-price {
    font-family: var(--sans);
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #9945FF, #14F195);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .skr-change {
    font-family: var(--mono);
    font-size: 0.75rem;
    margin-top: 2px;
  }
  .skr-change.up { color: var(--sol2); }
  .skr-change.down { color: var(--red); }

  /* Network card */
  .network-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .network-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 14px;
  }
  .net-stat { text-align: center; }
  .net-val {
    font-family: var(--sans);
    font-size: 1.2rem;
    font-weight: 700;
    color: var(--sol2);
    margin-bottom: 4px;
    letter-spacing: -0.02em;
  }
  .net-label { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); }

  .network-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }
  .network-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--sol), var(--sol2));
    width: 0%;
    transition: width 1.5s ease;
  }
  .net-status {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
  }
  .net-status-label { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); }
  .net-status-val { font-family: var(--mono); font-size: 0.65rem; color: var(--sol2); }

  /* Fear & Greed */
  .fg-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .fg-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 14px;
  }
  .fg-gauge {
    position: relative;
    width: 90px; height: 90px; flex-shrink: 0;
  }
  .fg-gauge svg { width: 90px; height: 90px; }
  .fg-number {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .fg-num { font-family: var(--sans); font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }
  .fg-tiny { font-family: var(--mono); font-size: 0.5rem; color: var(--muted); }
  .fg-info { flex: 1; }
  .fg-label { font-family: var(--sans); font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.01em; }
  .fg-desc { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); line-height: 1.6; }

  /* Last updated */
  .last-updated {
    text-align: center;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--muted);
    margin-top: 20px;
  }

  /* Refresh button */
  .refresh-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: linear-gradient(135deg, rgba(153,69,255,0.15), rgba(20,241,149,0.1));
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    cursor: pointer;
    text-align: center;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--sol); }
  .refresh-btn:active { transform: scale(0.98); }

  /* Loading skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, #1e2d55 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 4px;
    display: inline-block;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Fade in animation */
  .fade-in {
    animation: fadeIn 0.5s ease forwards;
    opacity: 0;
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  .fade-in:nth-child(1) { animation-delay: 0.1s; }
  .fade-in:nth-child(2) { animation-delay: 0.2s; }
  .fade-in:nth-child(3) { animation-delay: 0.3s; }
  .fade-in:nth-child(4) { animation-delay: 0.4s; }
</style>
</head>

<div class="wrap">
  <header>
    <div class="logo-wrap">
      <div class="logo-ekg">
        <svg class="logo-ekg-svg" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="0%">

          <path class="logo-ekg-line" d="M0,20 L28,20 L32,20 L36,4 L40,36 L44,12 L47,28 L51,20 L80,20"/>
        </svg>
      </div>
      <div class="logo-text"><span>Sol</span><span>EKG</span></div>

  <!-- SOL Hero -->

    <div class="sol-top">
      <div>
        <div class="sol-name">SOL / USD</div>

        <div class="sol-stat-val" id="sol-high">—</div>

      <div class="sol-stat">
        <div class="sol-stat-label">24H LOW</div>
        <div class="sol-stat-val" id="sol-low">—</div>
      </div>
      <div class="sol-stat">
        <div class="sol-stat-label">MARKET CAP</div>
        <div class="sol-stat-val" id="sol-mcap">—</div>
      </div>
      <div class="sol-stat">
        <div class="sol-stat-label">VOLUME 24H</div>
        <div class="sol-stat-val" id="sol-vol">—</div>
      </div>
    </div>
  </div>

  <!-- Network -->
  <div class="section-label">Network</div>
  <div class="network-card fade-in">
    <div class="network-grid">
      <div class="net-stat">
        <div class="net-val" id="net-tps">—</div>
        <div class="net-label">TPS</div>
      </div>
      <div class="net-stat">
        <div class="net-val" id="net-slot">—</div>
        <div class="net-label">SLOT</div>
      </div>
      <div class="net-stat">
        <div class="net-val" id="net-status-dot">●</div>
        <div class="net-label">STATUS</div>
      </div>
    </div>
    <div class="network-bar">
      <div class="network-bar-fill" id="tps-bar"></div>
    </div>
    <div class="net-status">
      <span class="net-status-label">Network Load</span>
      <span class="net-status-val" id="net-load">—</span>
    </div>
  </div>

<script>
const fmt = (n, decimals=2) => n?.toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals}) ?? '—';
const fmtB = n => n >= 1e9 ? '$' + (n/1e9).toFixed(1) + 'B' : n >= 1e6 ? '$' + (n/1e6).toFixed(0) + 'M' : '—';
const fmtK = n => n >= 1e3 ? (n/1e3).toFixed(1) + 'K' : n?.toFixed(0) ?? '—';

function setChange(el, val) {
  const up = val >= 0;
  el.textContent = (up ? '▲ +' : '▼ ') + val.toFixed(2) + '%';
  el.className = 'sol-change ' + (up ? 'up' : 'down');
}
function setCoinChange(el, val) {
  const up = val >= 0;
  el.textContent = (up ? '▲ +' : '▼ ') + val.toFixed(2) + '%';
  el.className = 'coin-change ' + (up ? 'up' : 'down');
}



async function loadPrices() {
  try {
    const res = await fetch('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=solana,solana-mobile-seeker&order=market_cap_desc&price_change_percentage=24h&x_cg_demo_api_key=CG-G5fjQ4bn4agszxSwWcpmxqxF');
    const data = await res.json();
    const sol = data.find(d => d.id === 'solana');
  } catch(e) { console.log('Price fetch failed', e); }
}

}

async function loadNetwork() {
  try {
    const res = await fetch('https://api.mainnet-beta.solana.com', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({jsonrpc:'2.0', id:1, method:'getRecentPerformanceSamples', params:[1]})
    });
    const data = await res.json();
    const sample = data.result?.[0];
    if (sample) {
      const tps = Math.round(sample.numTransactions / sample.samplePeriodSecs);
      document.getElementById('net-tps').textContent = tps.toLocaleString();
      const load = Math.min(100, Math.round((tps / 4000) * 100));
      document.getElementById('tps-bar').style.width = load + '%';
      document.getElementById('net-load').textContent = load + '%';
    }
    // Slot
    const slotRes = await fetch('https://api.mainnet-beta.solana.com', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({jsonrpc:'2.0', id:2, method:'getSlot'})
    });
    const slotData = await slotRes.json();
    if (slotData.result) {
      document.getElementById('net-slot').textContent = (slotData.result/1e6).toFixed(1) + 'M';
    }
    document.getElementById('net-status-dot').style.color = '#14F195';
  } catch(e) {
    document.getElementById('net-status-dot').textContent = '●';
    document.getElementById('net-status-dot').style.color = '#FF4757';
  }
}

async function loadFearGreed() {
  try {
    const res = await fetch('https://api.alternative.me/fng/');
    const data = await res.json();
    const val = parseInt(data.data[0].value);
    const classification = data.data[0].value_classification;

    document.getElementById('fg-num').textContent = val;
    document.getElementById('fg-label').textContent = classification;

    const colors = {
      'Extreme Fear': '#FF4757',
      'Fear': '#FFB800',
      'Neutral': '#6b6b78',
      'Greed': '#14F195',
      'Extreme Greed': '#9945FF'
    };
    const col = colors[classification] || '#14F195';
    document.getElementById('fg-arc').style.stroke = col;
    document.getElementById('fg-num').style.color = col;
    document.getElementById('fg-label').style.color = col;

    const dashoffset = 239 - (val / 100) * 239;
    document.getElementById('fg-arc').style.strokeDashoffset = dashoffset;

    const descs = {
      'Extreme Fear': 'Market is in panic. Historically a buying opportunity.',
      'Fear': 'Investors are worried. Caution advised.',
      'Neutral': 'Market sentiment is balanced.',
      'Greed': 'Markets are optimistic. Watch for corrections.',
      'Extreme Greed': 'Market may be overheated. Be careful.'
    };
    document.getElementById('fg-desc').textContent = descs[classification] || '';
  } catch(e) {}
}

async function loadAll() {
  document.getElementById('last-updated').textContent = 'Refreshing...';
  await Promise.all([loadPrices(), loadNetwork(), loadFearGreed()]);
  const now = new Date();
  document.getElementById('last-updated').textContent =
    'Last updated: ' + now.toLocaleTimeString();
}

loadAll();
setInterval(loadAll, 60000);
</script>
